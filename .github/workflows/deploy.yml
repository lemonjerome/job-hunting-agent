name: Deploy to Google Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:   # manual trigger

env:
  REGION: us-central1
  ARTIFACT_REPO: job-agent
  CLOUD_RUN_SERVICE: job-agent
  CLOUD_FUNCTION_NAME: gmail-trigger
  PUBSUB_TOPIC: gmail-job-alerts

jobs:
  # ---------------------------------------------------------------------------
  # Build Docker image and push to Artifact Registry
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        id: image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/${{ env.ARTIFACT_REPO }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Built and pushed: $IMAGE"

  # ---------------------------------------------------------------------------
  # Deploy Cloud Run service (Docker agent)
  # ---------------------------------------------------------------------------
  deploy-cloud-run:
    name: Deploy Cloud Run Service
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Run service
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image "${{ needs.build-and-push.outputs.image }}" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --memory 1Gi \
            --cpu 1 \
            --timeout 300 \
            --concurrency 1 \
            --max-instances 3 \
            --service-account "job-agent-runner@${{ secrets.GCP_PROJECT }}.iam.gserviceaccount.com" \
            --no-allow-unauthenticated \
            --set-secrets "\
              OLLAMA_BASE_URL=OLLAMA_BASE_URL:latest,\
              OLLAMA_API_KEY=OLLAMA_API_KEY:latest,\
              SELF_EMAIL=SELF_EMAIL:latest,\
              RESUME_FILENAME=RESUME_FILENAME:latest,\
              GCP_PROJECT=GCP_PROJECT:latest" \
            --set-env-vars "OLLAMA_MODEL=minimax-m2.7,GCP_PROJECT=${{ secrets.GCP_PROJECT }},GMAIL_TOKEN_SECRET=gmail-oauth-token" \
            --quiet

      - name: Get Cloud Run URL
        id: cloud-run-url
        run: |
          URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region "${{ env.REGION }}" \
            --format "value(status.url)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Cloud Run URL: $URL"

      - name: Store Cloud Run URL as GitHub output
        run: echo "CLOUD_RUN_URL=${{ steps.cloud-run-url.outputs.url }}" >> "$GITHUB_ENV"

  # ---------------------------------------------------------------------------
  # Deploy Cloud Function (Gmail trigger)
  # ---------------------------------------------------------------------------
  deploy-cloud-function:
    name: Deploy Cloud Function
    runs-on: ubuntu-latest
    needs: deploy-cloud-run

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get Cloud Run URL
        id: cloud-run-url
        run: |
          URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region "${{ env.REGION }}" \
            --format "value(status.url)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Deploy Cloud Run Function (2nd gen)
        run: |
          gcloud functions deploy ${{ env.CLOUD_FUNCTION_NAME }} \
            --gen2 \
            --runtime python311 \
            --region "${{ env.REGION }}" \
            --source cloud_function/ \
            --entry-point handle_gmail_notification \
            --trigger-http \
            --allow-unauthenticated \
            --memory 256Mi \
            --timeout 120s \
            --service-account "job-agent-runner@${{ secrets.GCP_PROJECT }}.iam.gserviceaccount.com" \
            --set-env-vars "\
              AGENT_CLOUD_RUN_URL=${{ steps.cloud-run-url.outputs.url }},\
              GCP_PROJECT=${{ secrets.GCP_PROJECT }},\
              GMAIL_TOKEN_SECRET=gmail-oauth-token" \
            --quiet

      - name: Get Cloud Function URL
        id: function-url
        run: |
          URL=$(gcloud functions describe ${{ env.CLOUD_FUNCTION_NAME }} \
            --region "${{ env.REGION }}" \
            --gen2 \
            --format "value(serviceConfig.uri)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Cloud Function URL: $URL"

      - name: Create Pub/Sub push subscription (idempotent)
        run: |
          FUNCTION_URL="${{ steps.function-url.outputs.url }}"
          SA="job-agent-runner@${{ secrets.GCP_PROJECT }}.iam.gserviceaccount.com"

          # Create subscription if it doesn't exist
          gcloud pubsub subscriptions create gmail-trigger-sub \
            --topic "${{ env.PUBSUB_TOPIC }}" \
            --push-endpoint "$FUNCTION_URL" \
            --push-auth-service-account "$SA" \
            --ack-deadline 300 \
            --message-retention-duration 1h \
            2>/dev/null || \
          gcloud pubsub subscriptions modify-push-config gmail-trigger-sub \
            --push-endpoint "$FUNCTION_URL" \
            --push-auth-service-account "$SA"

          echo "Pub/Sub subscription pointing to $FUNCTION_URL"

  # ---------------------------------------------------------------------------
  # Summary
  # ---------------------------------------------------------------------------
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-cloud-run, deploy-cloud-function]
    if: always()

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Print deployment URLs
        run: |
          echo "=== Deployment Complete ==="
          echo ""
          echo "Cloud Run service:"
          gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region "${{ env.REGION }}" \
            --format "value(status.url)" 2>/dev/null || echo "(not found)"

          echo ""
          echo "Cloud Function:"
          gcloud functions describe ${{ env.CLOUD_FUNCTION_NAME }} \
            --region "${{ env.REGION }}" \
            --gen2 \
            --format "value(serviceConfig.uri)" 2>/dev/null || echo "(not found)"

          echo ""
          echo "Add these GitHub Secrets if not set:"
          echo "  GCP_SA_KEY  — service account JSON (Cloud Run Admin + Functions Admin + Artifact Writer)"
          echo "  GCP_PROJECT — your GCP project ID"
